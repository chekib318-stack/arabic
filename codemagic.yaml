workflows:
  android-workflow:
    name: Arabia Edu - Android APK
    max_build_duration: 60
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: توليد مجلد android/ تلقائيا إذا كان ناقصا
        script: |
          if [ ! -f "android/app/build.gradle" ]; then
            echo "android/ غير موجود — يتم توليده الآن عبر flutter create"
            flutter create . --platforms=android --org tn.gov.education --project-name arabia_edu
          else
            echo "android/ موجود مسبقا، تخطي التوليد"
          fi
      - name: تصحيح اسم التطبيق الظاهر تحت الأيقونة (launcher label)
        script: |
          sed -i 's/android:label="[^"]*"/android:label="تعليم العربية - تحضيري"/' \
            android/app/src/main/AndroidManifest.xml
      - name: إضافة صلاحية الميكروفون للتعرف على الكلام
        script: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i '0,/<manifest[^>]*>/s//&\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.INTERNET" \/>/' "$MANIFEST"
          fi
          if ! grep -q "RECOGNITION_SERVICE" "$MANIFEST"; then
            sed -i '0,/<\/application>/s//&\n    <queries>\n        <intent>\n            <action android:name="android.speech.RecognitionService" \/>\n        <\/intent>\n    <\/queries>/' "$MANIFEST"
          fi
          cat "$MANIFEST"
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze || true
      - name: Build APK (release)
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.apk
      - build/app/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - chekib318@gmail.com
        notify:
          success: true
          failure: true
